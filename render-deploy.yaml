services:
  # PostgreSQL Database
  - type: pserv
    name: stl-django-db
    plan: free
    region: frankfurt
    ipAllowList: []

  # Django Web Service
  - type: web
    name: stl-django
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: stl-django-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://stl-django.onrender.com
