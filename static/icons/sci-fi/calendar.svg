<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="cal-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="50%" style="stop-color:#8B7AB8"/>
      <stop offset="100%" style="stop-color:#6B5A8A"/>
    </linearGradient>
    <linearGradient id="cal-header-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9A8BC9"/>
      <stop offset="100%" style="stop-color:#7A6B9A"/>
    </linearGradient>
    <linearGradient id="cal-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="cal-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Основной календарь с объемом -->
  <rect x="3" y="4" width="18" height="18" rx="2"
        fill="url(#cal-body-grad)"
        stroke="#C8B8E8"
        stroke-width="1.5"
        filter="url(#cal-shadow)"/>

  <!-- Заголовок календаря -->
  <rect x="3" y="4" width="18" height="6" rx="2"
        fill="url(#cal-header-grad)"/>

  <!-- Глянцевый блик -->
  <rect x="3" y="4" width="18" height="8" rx="2"
        fill="url(#cal-gloss-grad)"/>

  <!-- Петли/крепления -->
  <line x1="16" y1="2" x2="16" y2="6"
        stroke="#B8A8E0"
        stroke-width="2.5"
        stroke-linecap="round"/>
  <line x1="8" y1="2" x2="8" y2="6"
        stroke="#B8A8E0"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Разделительная линия -->
  <line x1="3" y1="10" x2="21" y2="10"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"/>

  <!-- Выделенная дата с объемом -->
  <circle cx="12" cy="16" r="3"
          fill="#4A3861"
          stroke="#6B5A8A"
          stroke-width="1"/>
  <circle cx="12" cy="16" r="1.5"
          fill="#D8C8F0"/>

  <!-- Блик на дате -->
  <circle cx="11.3" cy="15.3" r="0.6"
          fill="rgba(255,255,255,0.5)"/>

  <!-- Линии сетки календаря -->
  <line x1="7" y1="13" x2="7" y2="19"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.5"/>
  <line x1="17" y1="13" x2="17" y2="19"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.5"/>
  <line x1="12" y1="13" x2="12" y2="19"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.5"/>
</svg>
