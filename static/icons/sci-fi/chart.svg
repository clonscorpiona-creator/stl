<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="chart-bar1-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="100%" style="stop-color:#7A6B9A"/>
    </linearGradient>
    <linearGradient id="chart-bar2-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8B8E8"/>
      <stop offset="100%" style="stop-color:#8B7AB8"/>
    </linearGradient>
    <linearGradient id="chart-bar3-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9A8BC9"/>
      <stop offset="100%" style="stop-color:#6B5A8A"/>
    </linearGradient>
    <linearGradient id="chart-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="chart-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Базовая линия -->
  <path d="M4 20h16"
        stroke="#B8A8E0"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Левый бар с объемом -->
  <rect x="4" y="12" width="4" height="8" rx="1"
        fill="url(#chart-bar3-grad)"
        stroke="#B8A8E0"
        stroke-width="1"
        filter="url(#chart-shadow)"/>
  <rect x="4" y="12" width="4" height="3" rx="1"
        fill="url(#chart-gloss-grad)"/>

  <!-- Средний бар с объемом -->
  <rect x="10" y="2" width="4" height="18" rx="1"
        fill="url(#chart-bar2-grad)"
        stroke="#C8B8E8"
        stroke-width="1"/>
  <rect x="10" y="2" width="4" height="6" rx="1"
        fill="url(#chart-gloss-grad)"/>

  <!-- Правый бар с объемом -->
  <rect x="16" y="8" width="4" height="12" rx="1"
        fill="url(#chart-bar1-grad)"
        stroke="#A898D0"
        stroke-width="1"/>
  <rect x="16" y="8" width="4" height="4" rx="1"
        fill="url(#chart-gloss-grad)"/>

  <!-- Линии сетки -->
  <line x1="6" y1="20" x2="6" y2="10"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.8"/>
  <line x1="12" y1="20" x2="12" y2="4"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.8"/>
  <line x1="18" y1="20" x2="18" y2="10"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.8"/>
</svg>
