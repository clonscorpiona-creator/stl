<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="user-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A6B9A"/>
      <stop offset="50%" style="stop-color:#5A4A7A"/>
      <stop offset="100%" style="stop-color:#3D2961"/>
    </linearGradient>
    <linearGradient id="user-head-grad" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="50%" style="stop-color:#8B7AB8"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <filter id="user-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="user-online-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Тело с объемом -->
  <path d="M12 11c-3.5 0-6.5 2.5-6.5 6v3a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-3c0-3.5-3-6-6.5-6z"
        fill="url(#user-body-grad)"
        stroke="#9A8BC9"
        stroke-width="1.5"
        filter="url(#user-shadow)"/>

  <!-- Голова с 3D эффектом -->
  <circle cx="12" cy="6.5" r="4"
          fill="url(#user-head-grad)"
          stroke="#C8B8E8"
          stroke-width="1.2"/>

  <!-- Блик на голове -->
  <ellipse cx="10.5" cy="5.5" rx="1.5" ry="1"
           fill="rgba(255,255,255,0.35)"/>

  <!-- Объем на теле -->
  <path d="M12 12c-2.5 0-4.5 1.8-4.5 4v2.5h9V16c0-2.2-2-4-4.5-4z"
        fill="rgba(255,255,255,0.1)"/>

  <!-- Зеленый индикатор онлайн -->
  <circle cx="17.5" cy="15.5" r="2.5"
          fill="url(#user-online-grad)"
          stroke="#86EFAC"
          stroke-width="0.8"/>
  <circle cx="18" cy="15" r="0.8"
          fill="rgba(255,255,255,0.5)"/>
</svg>
