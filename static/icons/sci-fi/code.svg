<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="code-bracket-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#9A8BC9"/>
      <stop offset="50%" style="stop-color:#7A6B9A"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <linearGradient id="code-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="code-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Левая скобка с объемом -->
  <polyline points="16 18 22 12 16 6"
            fill="none"
            stroke="url(#code-bracket-grad)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#code-shadow)"/>

  <!-- Правая скобка с объемом -->
  <polyline points="8 6 2 12 8 18"
            fill="none"
            stroke="url(#code-bracket-grad)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Блик на скобках -->
  <path d="M17 16l4-4-4-4"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <path d="M7 8L3 12l4 4"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Центральная линия -->
  <line x1="12" y1="2" x2="12" y2="22"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="1"/>
</svg>
