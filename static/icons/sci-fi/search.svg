<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="search-lens-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7AB8"/>
      <stop offset="50%" style="stop-color:#6B5A8A"/>
      <stop offset="100%" style="stop-color:#4A3861"/>
    </linearGradient>
    <linearGradient id="search-glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="search-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Линза с объемом -->
  <circle cx="11" cy="11" r="8"
          fill="url(#search-lens-grad)"
          stroke="#A898D0"
          stroke-width="1.5"
          filter="url(#search-shadow)"/>

  <!-- Стеклянный блик на линзе -->
  <circle cx="11" cy="11" r="7"
          fill="url(#search-glass-grad)"/>

  <!-- Внутренний круг линзы с объемом -->
  <circle cx="11" cy="11" r="4"
          fill="#3D2F5A"
          stroke="#5A4A6A"
          stroke-width="0.8"/>

  <!-- Блик на стекле -->
  <ellipse cx="9" cy="9" rx="2" ry="1.5"
           fill="rgba(255,255,255,0.35)"/>

  <!-- Ручка с объемом -->
  <path d="M16.5 16.5L21 21"
        stroke="url(#search-lens-grad)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Блик на ручке -->
  <line x1="17" y1="17" x2="20" y2="20"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"/>
</svg>
