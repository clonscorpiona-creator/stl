<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="set-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#9A8BC9"/>
      <stop offset="50%" style="stop-color:#7A6B9A"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <linearGradient id="set-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="set-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Шестеренка с объемом -->
  <g filter="url(#set-shadow)">
    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"
          fill="url(#set-body-grad)"
          stroke="#B8A8E0"
          stroke-width="1.5"/>

    <!-- Зубцы шестеренки -->
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          fill="url(#set-body-grad)"
          stroke="#B8A8E0"
          stroke-width="1.2"/>
  </g>

  <!-- Глянцевый блик на шестеренке -->
  <circle cx="12" cy="12" r="9"
          fill="url(#set-gloss-grad)"/>

  <!-- Внутренний круг с объемом -->
  <circle cx="12" cy="12" r="3"
          fill="#4A3861"
          stroke="#6B5A8A"
          stroke-width="1"/>

  <!-- Блик в центре -->
  <circle cx="11" cy="11" r="1"
          fill="rgba(255,255,255,0.4)"/>

  <!-- Декоративные линии для объема -->
  <circle cx="12" cy="12" r="5"
          stroke="rgba(255,255,255,0.15)"
          stroke-width="0.5"
          fill="none"/>
</svg>
