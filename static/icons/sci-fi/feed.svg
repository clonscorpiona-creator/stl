<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="feed-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7AB8"/>
      <stop offset="50%" style="stop-color:#6B5A8A"/>
      <stop offset="100%" style="stop-color:#4A3861"/>
    </linearGradient>
    <linearGradient id="feed-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8B8E8"/>
      <stop offset="100%" style="stop-color:#8B7AB8"/>
    </linearGradient>
    <filter id="feed-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Основной фон с объемом -->
  <rect x="3" y="3" width="18" height="18" rx="3"
        fill="url(#feed-body-grad)"
        stroke="#A898D0"
        stroke-width="1.5"
        filter="url(#feed-shadow)"/>

  <!-- Блик на поверхности -->
  <rect x="3" y="3" width="18" height="9" rx="3"
        fill="rgba(255,255,255,0.08)"/>

  <!-- Линии контента с объемом -->
  <line x1="6" y1="8" x2="18" y2="8"
        stroke="url(#feed-line-grad)"
        stroke-width="2"
        stroke-linecap="round"/>
  <line x1="6" y1="12" x2="18" y2="12"
        stroke="url(#feed-line-grad)"
        stroke-width="2"
        stroke-linecap="round"/>
  <line x1="6" y1="16" x2="14" y2="16"
        stroke="url(#feed-line-grad)"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Точки-индикаторы с объемом -->
  <circle cx="17" cy="16" r="1.5"
          fill="#B8A8E0"
          stroke="#D8C8F0"
          stroke-width="0.5"/>
</svg>
