<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="msg-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7AB8"/>
      <stop offset="50%" style="stop-color:#6B5A8A"/>
      <stop offset="100%" style="stop-color:#4A3861"/>
    </linearGradient>
    <linearGradient id="msg-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="msg-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Основной пузырь сообщения с объемом -->
  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        fill="url(#msg-body-grad)"
        stroke="#A898D0"
        stroke-width="1.5"
        filter="url(#msg-shadow)"/>

  <!-- Глянцевый блик на поверхности -->
  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        fill="url(#msg-gloss-grad)"/>

  <!-- Точки-индикаторы с объемом -->
  <circle cx="9" cy="10" r="1.2"
          fill="#C8B8E8"
          stroke="#D8C8F0"
          stroke-width="0.5"/>
  <circle cx="13" cy="10" r="1.2"
          fill="#C8B8E8"
          stroke="#D8C8F0"
          stroke-width="0.5"/>
  <circle cx="17" cy="10" r="1.2"
          fill="#C8B8E8"
          stroke="#D8C8F0"
          stroke-width="0.5"/>

  <!-- Блик на точках -->
  <circle cx="8.7" cy="9.7" r="0.4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="12.7" cy="9.7" r="0.4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="16.7" cy="9.7" r="0.4" fill="rgba(255,255,255,0.5)"/>

  <!-- Декоративные линии для объема -->
  <path d="M7 8h10M7 12h6"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.8"
        stroke-linecap="round"/>
</svg>
