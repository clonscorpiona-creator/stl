<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="pal-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A8E0"/>
      <stop offset="50%" style="stop-color:#9A7AB8"/>
      <stop offset="100%" style="stop-color:#7A5A9A"/>
    </linearGradient>
    <linearGradient id="pal-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="pal-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Основная палитра с объемом -->
  <circle cx="12" cy="12" r="10"
          fill="url(#pal-body-grad)"
          stroke="#D8B8F0"
          stroke-width="1.5"
          filter="url(#pal-shadow)"/>

  <!-- Глянцевый блик -->
  <circle cx="12" cy="12" r="9"
          fill="url(#pal-gloss-grad)"/>

  <!-- Цвета на палитре с объемом -->
  <circle cx="12" cy="8" r="2"
          fill="#FF8FA8"
          stroke="#FFB8C8"
          stroke-width="0.5"/>
  <circle cx="8" cy="12" r="2"
          fill="#8AB8FF"
          stroke="#B8D8FF"
          stroke-width="0.5"/>
  <circle cx="16" cy="12" r="2"
          fill="#8AFFB8"
          stroke="#B8FFD8"
          stroke-width="0.5"/>
  <circle cx="10" cy="16" r="2"
          fill="#FFD88A"
          stroke="#FFE8B8"
          stroke-width="0.5"/>

  <!-- Блики на цветах -->
  <circle cx="11.5" cy="7.5" r="0.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="7.5" cy="11.5" r="0.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="15.5" cy="11.5" r="0.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="9.5" cy="15.5" r="0.8" fill="rgba(255,255,255,0.5)"/>

  <!-- Декоративное отверстие -->
  <circle cx="12" cy="12" r="1.5"
          fill="#4A3861"
          stroke="#6B5A8A"
          stroke-width="0.8"/>
</svg>
