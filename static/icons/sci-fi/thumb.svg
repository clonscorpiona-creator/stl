<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="thumb-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#6BC988"/>
      <stop offset="50%" style="stop-color:#4A9A5A"/>
      <stop offset="100%" style="stop-color:#3A7A4A"/>
    </linearGradient>
    <linearGradient id="thumb-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="thumb-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Большой палец с объемом -->
  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"
        fill="url(#thumb-body-grad)"
        stroke="#8BDB98"
        stroke-width="1.5"
        filter="url(#thumb-shadow)"/>

  <!-- Глянцевый блик -->
  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"
        fill="url(#thumb-gloss-grad)"/>

  <!-- Остальная часть руки -->
  <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"
        fill="url(#thumb-body-grad)"
        stroke="#8BDB98"
        stroke-width="1.5"/>

  <!-- Блик на пальце -->
  <ellipse cx="10" cy="8" rx="1.5" ry="2"
           fill="rgba(255,255,255,0.35)"/>

  <!-- Суставы с объемом -->
  <path d="M8 15h2M8 18h2"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="1"
        stroke-linecap="round"/>
</svg>
