<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="scale-pole-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9A8BC9"/>
      <stop offset="50%" style="stop-color:#7A6B9A"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <linearGradient id="scale-bowl-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="100%" style="stop-color:#7A6B9A"/>
    </linearGradient>
    <linearGradient id="scale-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="scale-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Центральный столб -->
  <line x1="12" y1="3" x2="12" y2="21"
        stroke="url(#scale-pole-grad)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Блик на столбе -->
  <line x1="12" y1="5" x2="12" y2="19"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="1"
        stroke-linecap="round"/>

  <!-- Левая чаша с объемом -->
  <path d="M6 8l-4 4 4 4"
        fill="url(#scale-bowl-grad)"
        stroke="#C8B8E8"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#scale-shadow)"/>

  <!-- Правая чаша с объемом -->
  <path d="M18 8l4 4-4 4"
        fill="url(#scale-bowl-grad)"
        stroke="#C8B8E8"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Глянцевый блик на чашах -->
  <path d="M4 10l2 2-2 2"
        fill="url(#scale-gloss-grad)"/>
  <path d="M20 10l-2 2 2 2"
        fill="url(#scale-gloss-grad)"/>

  <!-- Линии подвеса -->
  <line x1="2" y1="12" x2="6" y2="12"
        stroke="#9A8BC9"
        stroke-width="1.5"
        stroke-linecap="round"/>
  <line x1="18" y1="12" x2="22" y2="12"
        stroke="#9A8BC9"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Верхушка весов -->
  <circle cx="12" cy="3" r="2.5"
          fill="url(#scale-bowl-grad)"
          stroke="#D8C8F0"
          stroke-width="1"/>
  <circle cx="12" cy="3" r="1"
          fill="rgba(255,255,255,0.4)"/>
</svg>
