<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="share-node-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#6BC9A8"/>
      <stop offset="50%" style="stop-color:#4A9A7A"/>
      <stop offset="100%" style="stop-color:#3A7A5A"/>
    </linearGradient>
    <linearGradient id="share-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8BDBB8"/>
      <stop offset="100%" style="stop-color:#4A9A7A"/>
    </linearGradient>
    <filter id="share-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Верхний узел с объемом -->
  <circle cx="18" cy="5" r="3"
          fill="url(#share-node-grad)"
          stroke="#8BDBB8"
          stroke-width="1.2"
          filter="url(#share-shadow)"/>

  <!-- Левый узел с объемом -->
  <circle cx="6" cy="12" r="3"
          fill="url(#share-node-grad)"
          stroke="#8BDBB8"
          stroke-width="1.2"/>

  <!-- Правый нижний узел с объемом -->
  <circle cx="18" cy="19" r="3"
          fill="url(#share-node-grad)"
          stroke="#8BDBB8"
          stroke-width="1.2"/>

  <!-- Линии связи с объемом -->
  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"
        stroke="url(#share-line-grad)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"
        stroke="url(#share-line-grad)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Блики на узлах -->
  <circle cx="17" cy="4.5" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="5" cy="11.5" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="17" cy="18.5" r="1" fill="rgba(255,255,255,0.4)"/>
</svg>
