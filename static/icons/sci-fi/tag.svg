<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="tag-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A8E0"/>
      <stop offset="50%" style="stop-color:#9A7AB8"/>
      <stop offset="100%" style="stop-color:#7A5A9A"/>
    </linearGradient>
    <linearGradient id="tag-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="tag-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Бирка с объемом -->
  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
        fill="url(#tag-body-grad)"
        stroke="#D8B8F0"
        stroke-width="1.5"
        filter="url(#tag-shadow)"/>

  <!-- Глянцевый блик -->
  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
        fill="url(#tag-gloss-grad)"/>

  <!-- Отверстие с объемом -->
  <circle cx="7" cy="7" r="2"
          fill="#4A3861"
          stroke="#6B5A8A"
          stroke-width="1"/>

  <!-- Блик на отверстии -->
  <circle cx="6.3" cy="6.3" r="0.8"
          fill="rgba(255,255,255,0.4)"/>

  <!-- Декоративные линии для объема -->
  <path d="M5 5h8M5 9h6M9 5v6"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="0.8"
        stroke-linecap="round"/>
</svg>
