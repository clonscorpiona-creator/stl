<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="star-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD86A"/>
      <stop offset="50%" style="stop-color:#FFB84A"/>
      <stop offset="100%" style="stop-color:#E09A3A"/>
    </linearGradient>
    <linearGradient id="star-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
    <filter id="star-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Звезда с объемом -->
  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
           fill="url(#star-body-grad)"
           stroke="#FFC85A"
           stroke-width="1.5"
           filter="url(#star-shadow)"/>

  <!-- Глянцевый блик -->
  <polygon points="12 4 14 8 18 8.5 15 11.5 16 16 12 14 8 16 9 11.5 6 8.5 10 8 12 4"
           fill="url(#star-gloss-grad)"/>

  <!-- Основной блик -->
  <polygon points="12 5 13.5 8.5 17 9 14.5 11.5 15 15 12 13 9 15 9.5 11.5 7 9 10.5 8.5 12 5"
           fill="rgba(255,255,255,0.35)"/>

  <!-- Дополнительный блик -->
  <ellipse cx="10" cy="10" rx="2" ry="1.5"
           fill="rgba(255,255,255,0.25)"/>

  <!-- Внутренний контур для объема -->
  <polygon points="12 6 14 10 18 10.5 15 13.5 15.5 18 12 15.5 8.5 18 9 13.5 6 10.5 10 10 12 6"
           fill="none"
           stroke="rgba(255,255,255,0.25)"
           stroke-width="0.8"/>
</svg>
