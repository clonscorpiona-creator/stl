<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="logout-door-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A7A"/>
      <stop offset="50%" style="stop-color:#E07A5A"/>
      <stop offset="100%" style="stop-color:#C05A3A"/>
    </linearGradient>
    <linearGradient id="logout-arrow-grad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC8B8"/>
      <stop offset="100%" style="stop-color:#FF9A7A"/>
    </linearGradient>
    <filter id="logout-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Дверь/выход с объемом -->
  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
        fill="url(#logout-door-grad)"
        stroke="#FFB898"
        stroke-width="1.5"
        filter="url(#logout-shadow)"/>

  <!-- Блик на двери -->
  <rect x="5" y="3" width="4" height="8"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Стрелка выхода с объемом -->
  <polyline points="16 17 21 12 16 7"
            fill="none"
            stroke="url(#logout-arrow-grad)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Линия стрелки -->
  <line x1="21" y1="12" x2="9" y2="12"
        stroke="url(#logout-arrow-grad)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Блик на стрелке -->
  <line x1="10" y1="12" x2="20" y2="12"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"/>

  <!-- Декоративные элементы двери -->
  <circle cx="6.5" cy="14" r="0.8" fill="#FFD8C8"/>
</svg>
