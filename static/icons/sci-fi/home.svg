<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="home-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5582"/>
      <stop offset="50%" style="stop-color:#4A3861"/>
      <stop offset="100%" style="stop-color:#3D2961"/>
    </linearGradient>
    <linearGradient id="home-roof-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7AB8"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <filter id="home-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
    <filter id="home-highlight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Основной корпус дома -->
  <path d="M5 11v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9L12 5 5 11z"
        fill="url(#home-body-grad)"
        stroke="#9A8BC9"
        stroke-width="1.5"
        filter="url(#home-shadow)"/>

  <!-- Крыша с объемом -->
  <path d="M12 3L3 10.5V12l9-7.5 9 7.5v-1.5L12 3z"
        fill="url(#home-roof-grad)"
        stroke="#B8A8E0"
        stroke-width="1.2"/>

  <!-- Блик на крыше -->
  <path d="M12 5.5L6 10.2v.8l6-4.7 6 4.7v-.8L12 5.5z"
        fill="rgba(255,255,255,0.25)"
        filter="url(#home-highlight)"/>

  <!-- Окно с объемом -->
  <rect x="10.5" y="13" width="3" height="3" rx="0.5"
        fill="#2A1F3D"
        stroke="#7A6B9A"
        stroke-width="1"/>
  <rect x="11" y="13.5" width="2" height="2" rx="0.3"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Дверь с объемом -->
  <rect x="8.5" y="15" width="2.5" height="4" rx="0.3"
        fill="#3D2F5A"
        stroke="#6B5A8A"
        stroke-width="1"/>
  <circle cx="10.5" cy="17" r="0.4" fill="#B8A8E0"/>

  <!-- Декоративные элементы -->
  <path d="M6 20v-8M18 20v-8" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
