<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="gal-frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7AB8"/>
      <stop offset="50%" style="stop-color:#6B5A8A"/>
      <stop offset="100%" style="stop-color:#4A3861"/>
    </linearGradient>
    <linearGradient id="gal-sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A4A7A"/>
      <stop offset="100%" style="stop-color:#3D2961"/>
    </linearGradient>
    <linearGradient id="gal-sun-grad" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" style="stop-color:#FFD88A"/>
      <stop offset="100%" style="stop-color:#FFA85A"/>
    </linearGradient>
    <filter id="gal-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Рамка галереи с объемом -->
  <rect x="3" y="3" width="18" height="18" rx="3"
        fill="url(#gal-frame-grad)"
        stroke="#A898D0"
        stroke-width="1.5"
        filter="url(#gal-shadow)"/>

  <!-- Внутреннее изображение с объемом -->
  <rect x="5" y="5" width="14" height="14" rx="2"
        fill="url(#gal-sky-grad)"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="0.8"/>

  <!-- Горы с объемом -->
  <path d="M5 15L8 11l2.5 3L13 10l4 5v4H5z"
        fill="#3D2F5A"
        stroke="#5A4A6A"
        stroke-width="0.8"/>

  <!-- Солнце/Луна с объемом -->
  <circle cx="16" cy="8" r="2"
          fill="url(#gal-sun-grad)"
          stroke="#FFC87A"
          stroke-width="0.5"/>

  <!-- Блик на солнце -->
  <circle cx="15.5" cy="7.5" r="0.8"
          fill="rgba(255,255,255,0.5)"/>

  <!-- Блик на рамке -->
  <rect x="3" y="3" width="18" height="8" rx="3"
        fill="rgba(255,255,255,0.08)"/>
</svg>
