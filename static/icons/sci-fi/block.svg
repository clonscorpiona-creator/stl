<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="block-circle-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#E04A4A"/>
      <stop offset="100%" style="stop-color:#C03A3A"/>
    </linearGradient>
    <linearGradient id="block-line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A9A"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
    <filter id="block-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Запрещающий круг с объемом -->
  <circle cx="12" cy="12" r="10"
          fill="url(#block-circle-grad)"
          stroke="#FF8A8A"
          stroke-width="1.5"
          filter="url(#block-shadow)"/>

  <!-- Глянцевый блик -->
  <circle cx="12" cy="12" r="9"
          fill="rgba(255,255,255,0.1)"/>

  <!-- Диагональная линия с объемом -->
  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"
        stroke="url(#block-line-grad)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Блик на линии -->
  <line x1="6" y1="6" x2="18" y2="18"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1"
        stroke-linecap="round"/>

  <!-- Внутренний круг для объема -->
  <circle cx="12" cy="12" r="6"
          stroke="rgba(255,255,255,0.15)"
          stroke-width="0.8"
          fill="none"/>

  <!-- Блик на круге -->
  <ellipse cx="9" cy="9" rx="3" ry="1.5"
           fill="rgba(255,255,255,0.25)"/>
</svg>
