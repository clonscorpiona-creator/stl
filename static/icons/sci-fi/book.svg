<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="book-cover-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="50%" style="stop-color:#8B7AB8"/>
      <stop offset="100%" style="stop-color:#6B5A8A"/>
    </linearGradient>
    <linearGradient id="book-pages-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D8F8"/>
      <stop offset="100%" style="stop-color:#C8B8E8"/>
    </linearGradient>
    <linearGradient id="book-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="book-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Обложка книги с объемом -->
  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"
        fill="none"
        stroke="#D8C8F0"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Основная часть книги -->
  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
        fill="url(#book-cover-grad)"
        stroke="#C8B8E8"
        stroke-width="1.5"
        filter="url(#book-shadow)"/>

  <!-- Страницы книги -->
  <path d="M8 4h10v16H8z"
        fill="url(#book-pages-grad)"/>

  <!-- Глянцевый блик на обложке -->
  <path d="M6.5 2H20v8H6.5a2.5 2.5 0 0 0-2.5 2.5v-7.5A2.5 2.5 0 0 1 6.5 2z"
        fill="url(#book-gloss-grad)"/>

  <!-- Линии текста на страницах -->
  <line x1="10" y1="7" x2="18" y2="7"
        stroke="#9A8BC9"
        stroke-width="1.5"
        stroke-linecap="round"/>
  <line x1="10" y1="11" x2="18" y2="11"
        stroke="#9A8BC9"
        stroke-width="1.5"
        stroke-linecap="round"/>
  <line x1="10" y1="15" x2="16" y2="15"
        stroke="#9A8BC9"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Декоративный элемент на обложке -->
  <rect x="5" y="4" width="1.5" height="14" rx="0.5"
        fill="#4A3861"
        stroke="#6B5A8A"
        stroke-width="0.5"/>
</svg>
