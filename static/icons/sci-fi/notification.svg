<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="notif-body-grad" x1="30%" y1="20%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB86B"/>
      <stop offset="50%" style="stop-color:#FF9A4A"/>
      <stop offset="100%" style="stop-color:#E07A3A"/>
    </linearGradient>
    <linearGradient id="notif-gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.45)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="notif-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Основной колокол с объемом -->
  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
        fill="url(#notif-body-grad)"
        stroke="#FFC88A"
        stroke-width="1.5"
        filter="url(#notif-shadow)"/>

  <!-- Глянцевый блик -->
  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
        fill="url(#notif-gloss-grad)"/>

  <!-- Верхняя часть колокола с объемом -->
  <path d="M10 2h4v3h-4z"
        fill="#C87A3A"
        stroke="#E09A5A"
        stroke-width="1"/>

  <!-- Подвеска с объемом -->
  <path d="M13.73 21a2 2 0 0 1-3.46 0"
        fill="#E07A3A"
        stroke="#FF9A4A"
        stroke-width="1"/>

  <!-- Блик на колоколе -->
  <ellipse cx="9" cy="7" rx="2" ry="3"
           fill="rgba(255,255,255,0.3)"/>

  <!-- Декоративные линии для объема -->
  <path d="M7 10c0-2.5 2-4.5 5-4.5s5 2 5 4.5"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="0.8"
        fill="none"/>
</svg>
