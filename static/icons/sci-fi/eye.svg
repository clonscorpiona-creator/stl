<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="eye-white-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8A8E0"/>
      <stop offset="50%" style="stop-color:#8B7AB8"/>
      <stop offset="100%" style="stop-color:#5A4A7A"/>
    </linearGradient>
    <linearGradient id="eye-iris-grad" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" style="stop-color:#7A6B9A"/>
      <stop offset="100%" style="stop-color:#4A3861"/>
    </linearGradient>
    <radialGradient id="eye-pupil-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2A1F3D"/>
      <stop offset="100%" style="stop-color:#1A0F2D"/>
    </radialGradient>
    <filter id="eye-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Форма глаза с объемом -->
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
        fill="url(#eye-white-grad)"
        stroke="#C8B8E8"
        stroke-width="1.5"
        filter="url(#eye-shadow)"/>

  <!-- Верхнее веко с бликом -->
  <path d="M1 12s4-8 11-8"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Радужка с 3D эффектом -->
  <circle cx="12" cy="12" r="4"
          fill="url(#eye-iris-grad)"
          stroke="#9A8BC9"
          stroke-width="1"/>

  <!-- Зрачок -->
  <circle cx="12" cy="12" r="2"
          fill="url(#eye-pupil-grad)"/>

  <!-- Блик на глазу -->
  <circle cx="13.5" cy="10.5" r="1"
          fill="rgba(255,255,255,0.5)"/>

  <!-- Дополнительный блик -->
  <circle cx="10" cy="13" r="0.5"
          fill="rgba(255,255,255,0.3)"/>

  <!-- Нижнее веко -->
  <path d="M23 12s-4 8-11 8"
        stroke="rgba(0,0,0,0.2)"
        stroke-width="1.5"
        stroke-linecap="round"/>
</svg>
