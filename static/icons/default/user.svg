<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
  <defs>
    <linearGradient id="cyberUserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="cyberGlowUser">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="12" cy="7" r="4"
          stroke="url(#cyberUserGrad)"
          filter="url(#cyberGlowUser)"
          stroke-linecap="round"/>
  <path d="M4 21v-2a6 6 0 016-6h4a6 6 0 016 6v2"
        stroke="url(#cyberUserGrad)"
        filter="url(#cyberGlowUser)"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <circle cx="12" cy="7" r="2" fill="#00ff88" opacity="0.3" filter="url(#cyberGlowUser)"/>
  <path d="M12 3v1M12 10v1M20 19h1M3 19h1" stroke="#00f5ff" stroke-width="1" filter="url(#cyberGlowUser)"/>
  <!-- Зеленый индикатор онлайн -->
  <circle cx="17.5" cy="15.5" r="2.5" fill="#4ADE80" stroke="#86EFAC" stroke-width="0.8" filter="url(#cyberGlowUser)"/>
  <circle cx="18" cy="15" r="0.8" fill="rgba(255,255,255,0.5)" filter="url(#cyberGlowUser)"/>
</svg>
