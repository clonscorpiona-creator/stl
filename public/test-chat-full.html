<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Chat Full Test</title>
  <link rel="stylesheet" href="/css/chat.css">
  <style>
    body { margin: 0; padding: 0; background: #1a1a2e; }
    .chat-container { display: flex; height: 100vh; }
    .chat-sidebar { width: 250px; background: #16213e; border-right: 1px solid #0f3460; }
    .chat-sidebar-title { padding: 15px; margin: 0; color: #eee; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .channel-list { list-style: none; padding: 0; margin: 0; }
    .channel-item { padding: 12px 15px; cursor: pointer; color: #aaa; border-bottom: 1px solid #0f3460; }
    .channel-item:hover { background: #0f3460; color: #eee; }
    .channel-item.active { background: #e94560; color: #fff; }
    .chat-main { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 15px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .chat-header h2 { margin: 0 0 5px 0; color: #eee; }
    .channel-description { margin: 0; color: #888; font-size: 14px; }
    .messages-container { flex: 1; overflow-y: auto; padding: 15px; }
    .message { margin-bottom: 15px; }
    .message.own { text-align: right; }
    .message-author { color: #e94560; font-weight: bold; display: block; margin-bottom: 3px; }
    .message-content { color: #eee; display: block; }
    .message-time { color: #666; font-size: 12px; }
    .message-form { display: flex; padding: 15px; background: #16213e; border-top: 1px solid #0f3460; }
    .message-form input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #0f3460; color: #eee; }
    .message-form button { margin-left: 10px; padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .connection-status { font-size: 12px; padding: 5px 10px; border-radius: 4px; }
    .connection-status.connected { background: #27ae60; }
    .connection-status.disconnected { background: #e74c3c; }
  </style>
</head>
<body>
  <div class="chat-container">
    <aside class="chat-sidebar">
      <h3 class="chat-sidebar-title">
        Каналы <span class="connection-status disconnected" id="connection-status">Нет подключения</span>
      </h3>
      <ul class="channel-list" id="channel-list"></ul>
    </aside>

    <div class="chat-main">
      <div class="chat-header">
        <h2 id="channel-name"></h2>
        <p id="channel-description" class="channel-description"></p>
      </div>
      <div class="messages-container" id="messages"></div>
      <form class="message-form" id="message-form">
        <input type="text" id="message-input" placeholder="Введите сообщение..." required autocomplete="off">
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat-client.js"></script>
  <script>
    // Тестовые данные
    const testConfig = {
      channels: [
        { id: 1, name: 'Общий', description: 'Общий чат', slug: 'general' },
        { id: 2, name: 'Флудилка', description: 'Для общения', slug: 'flood' }
      ],
      currentChannel: { id: 1, name: 'Общий', description: 'Общий чат', slug: 'general' },
      userId: 1,
      userName: 'TestUser'
    };

    console.log('[Test] Starting with config:', testConfig);
    window.initChat(testConfig);
  </script>
</body>
</html>
