services:
  # Backend API Service (Next.js API Routes + Database)
  - type: web
    name: stl-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build:backend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stl-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    # Health check endpoint
    healthCheckPath: /api/health

  # PostgreSQL Database
  - type: pserv
    name: stl-db
    env: docker
    region: frankfurt
    plan: free
    disk:
      name: stl-db-disk
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
