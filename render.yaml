services:
  - type: web
    name: stl-platform
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput --clear && python manage.py migrate --noinput
    startCommand: daphne config.asgi:application -b 0.0.0.0 -p $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: '*'
      - key: DATABASE_URL
        sync: false
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      - key: STATIC_ROOT
        value: /opt/render/project/src/staticfiles
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
