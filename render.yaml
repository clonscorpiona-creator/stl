services:
  # Web Service (Next.js Application)
  - type: web
    name: stl-platform
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stl-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # PostgreSQL Database
  - type: pserv
    name: stl-db
    env: docker
    region: frankfurt
    plan: free
    disk:
      name: stl-db-disk
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
